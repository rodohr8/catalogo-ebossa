<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBOSSA GRÚAS — Catálogo de Refacciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --rojo:#CC0000;--fondo:#f0f0ee;--fondo-card:#ffffff;--header:#1e1e1e;
  --toolbar:#ffffff;--borde:#d8d8d4;--texto:#1a1a1a;--texto-dim:#777;--sombra:rgba(0,0,0,.08);
}
body{font-family:'Barlow',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
header{
  background:var(--header);border-bottom:4px solid var(--rojo);
  padding:0 32px;display:flex;align-items:center;justify-content:space-between;
  height:76px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)
}
.logo-img{height:52px;object-fit:contain}
.header-tagline{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;color:#aaa;
  border:1px solid #444;padding:5px 14px;border-radius:2px
}
.toolbar{
  background:var(--toolbar);border-bottom:1px solid var(--borde);
  padding:16px 32px;display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 4px var(--sombra)
}
.search-wrap{flex:1;position:relative;max-width:560px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--texto-dim);pointer-events:none}
#searchInput{
  width:100%;padding:10px 14px 10px 42px;
  background:#f8f8f6;border:1px solid var(--borde);border-radius:5px;
  color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;box-shadow:inset 0 1px 3px rgba(0,0,0,.06)
}
#searchInput:focus{border-color:var(--rojo);background:#fff}
#searchInput::placeholder{color:#bbb}
.result-count{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--texto-dim);white-space:nowrap;margin-left:auto}
.result-count b{color:var(--rojo);font-weight:700}
main{padding:28px 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
.card{
  background:var(--fondo-card);border:1px solid var(--borde);border-radius:10px;
  overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
  transition:transform .18s,border-color .18s,box-shadow .18s;box-shadow:0 1px 4px var(--sombra)
}
.card:hover{transform:translateY(-5px);border-color:var(--rojo);box-shadow:0 8px 28px rgba(204,0,0,.15)}
.card-img{background:#f8f8f8;height:168px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid #eee}
.card-img img{max-width:88%;max-height:88%;object-fit:contain}
.card-body{padding:14px 15px;flex:1;display:flex;flex-direction:column;gap:2px}
.part-no{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--rojo);letter-spacing:1.5px;font-weight:700}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;line-height:1.2;margin-top:4px;color:var(--texto)}
.card-brand{font-size:12px;color:var(--texto-dim);margin-top:3px;font-weight:500}
.card-cat{
  display:inline-block;margin-top:9px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--texto-dim);
  background:#f0f0ee;padding:3px 8px;border-radius:2px;align-self:flex-start;border:1px solid var(--borde)
}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--texto-dim);font-size:16px}
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)
}
.overlay.open{display:flex}
.modal{
  background:#fff;border:1px solid var(--borde);border-radius:12px;
  max-width:660px;width:100%;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .2s ease
}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{
  position:absolute;top:14px;right:14px;background:rgba(0,0,0,.08);border:none;
  color:var(--texto);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2
}
.modal-close:hover{background:var(--rojo);color:#fff}
.modal-img{background:#f8f8f8;height:280px;display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--rojo)}
.modal-img img{max-width:82%;max-height:82%;object-fit:contain}
.modal-body{padding:24px 28px 28px}
.modal-part{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--rojo);letter-spacing:2px;margin-bottom:6px}
.modal-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1.1;color:var(--texto)}
.modal-meta{display:flex;gap:24px;margin-top:18px;padding-top:18px;border-top:1px solid var(--borde)}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--texto-dim)}
.meta-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--texto)}
.meta-val.accent{color:var(--rojo)}
.meta-val.green{color:#16a34a}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--fondo)}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--rojo)}
</style>
</head>

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=products.filter(p=>!q||p.name.toLowerCase().includes(q)||String(p.part).toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));
  document.getElementById('cnt').textContent=list.length;
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty">No se encontraron artículos.</div>';return;}
  g.innerHTML=list.map(p=>`
    <div class="card" onclick="openModal(${p.id})">
      <div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='${PH}'"></div>
      <div class="card-body">
        <div class="part-no">${p.part}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-brand">${p.brand}</div>
        <span class="card-cat">${p.cat}</span>
      </div>
    </div>`).join('');
}

function openModal(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  document.getElementById('mPart').textContent='N/P: '+p.part;
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mBrand').textContent=p.brand;
  document.getElementById('mCat').textContent=p.cat;
  document.getElementById('mImg').src=p.img;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
